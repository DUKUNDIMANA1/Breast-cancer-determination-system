services:
  # Flask Web Service
  - type: web
    name: breastcare-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        value: ${MONGO_URI}
      - key: MONGO_DB_NAME
        value: ${MONGO_DB_NAME}
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: EMAIL_SERVER
        value: ${EMAIL_SERVER}
      - key: EMAIL_PORT
        value: ${EMAIL_PORT}
      - key: EMAIL_USERNAME
        value: ${EMAIL_USERNAME}
      - key: EMAIL_PASSWORD
        value: ${EMAIL_PASSWORD}

# Auto-scaling configuration
autoscaling:
  enabled: true
  minInstances: 1
  maxInstances: 10
  targetMemoryPercent: 70
  targetCPUPercent: 80

# Health check configuration
healthCheck:
  httpHeaders:
    - key: User-Agent
      value: breastcare-ai-health-check/1.0

# Build optimization
build:
  dockerfilePath: ./Dockerfile
  dockerContext: .

# Deployment regions
regions:
  - oregon
  - frankfurt
  - singapore
